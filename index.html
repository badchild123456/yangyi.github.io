<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健保藥品查詢與管理系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- SheetJS (Excel 匯入匯出) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <style>
        thead th { position: sticky; top: 0; z-index: 10; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body.modal-open { overflow: hidden; }
        div:where(.swal2-container) { font-family: inherit; }
        mark.search-highlight {
            background-color: #fde047;
            color: #0f172a;
            padding: 0 0.2rem;
            border-radius: 0.125rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans flex flex-col">

    <div class="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
        
        <!-- Header 區塊 -->
        <header class="mb-8 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl font-bold text-blue-700 flex items-center justify-center lg:justify-start gap-3">
                    <i class="fa-solid fa-database"></i> 藥品管理系統
                </h1>
                <p class="text-slate-500 mt-2 text-sm">支援高亮搜尋、新增刪除、即時編輯與 Excel 匯出入</p>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto items-center">
                <!-- 搜尋框 -->
                <div class="relative w-full sm:w-64">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
                    </div>
                    <input type="text" id="searchInput" 
                        class="bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5 shadow-sm transition-all" 
                        placeholder="搜尋藥品關鍵字..." disabled>
                </div>

                <!-- 工具列按鈕群 -->
                <div class="flex flex-wrap gap-2 w-full sm:w-auto justify-center">
                    <!-- 🌟 新增按鈕 -->
                    <button id="addBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm px-4 py-2.5 transition-colors shadow-sm flex items-center justify-center gap-2 disabled:opacity-50" title="手動新增一筆藥品資料" disabled>
                        <i class="fa-solid fa-plus"></i> 新增藥品
                    </button>

                    <input type="file" id="excelFileInput" class="hidden" accept=".xlsx, .xls, .csv">
                    <button id="importExcelBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg text-sm px-4 py-2.5 transition-colors shadow-sm flex items-center justify-center gap-2" title="從本機上傳 Excel 更新資料">
                        <i class="fa-solid fa-file-import"></i> 匯入
                    </button>
                    
                    <button id="exportExcelBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-sm px-4 py-2.5 transition-colors shadow-sm flex items-center justify-center gap-2 disabled:opacity-50" title="將目前的資料匯出為 Excel" disabled>
                        <i class="fa-solid fa-file-export"></i> 匯出
                    </button>
                </div>
            </div>
        </header>

        <!-- 狀態顯示區塊 -->
        <div id="statusMessage" class="flex flex-col items-center justify-center py-12">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
            <p id="statusText" class="text-slate-600 font-medium text-lg">正在從資料庫載入資料...</p>
        </div>

        <!-- 表格與分頁區塊 -->
        <div id="tableContainer" class="bg-white rounded-xl shadow-md overflow-hidden hidden border border-slate-200 flex flex-col">
            <div class="overflow-x-auto" style="min-height: 50vh; max-height: 65vh;">
                <table class="w-full text-sm text-left text-slate-600">
                    <thead id="tableHead" class="text-xs text-slate-700 uppercase bg-slate-100 shadow-sm">
                        <!-- 表頭 -->
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-200">
                        <!-- 資料 -->
                    </tbody>
                </table>
                <div id="noDataMessage" class="hidden py-16 text-center text-slate-500">
                    <i class="fa-regular fa-folder-open text-5xl mb-4 text-slate-300"></i>
                    <p class="text-lg">找不到符合條件的藥品</p>
                </div>
            </div>

            <div class="bg-slate-50 px-4 py-3 border-t border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="text-sm text-slate-600 text-center sm:text-left w-full sm:w-auto" id="paginationInfo"></div>
                <div class="flex space-x-2">
                    <button id="prevPageBtn" class="px-3 py-1.5 border border-slate-300 text-slate-600 bg-white hover:bg-slate-100 rounded text-sm disabled:opacity-50 transition-colors flex items-center gap-1">
                        <i class="fa-solid fa-chevron-left"></i> 上一頁
                    </button>
                    <div id="pageNumbers" class="hidden sm:flex items-center space-x-1"></div>
                    <button id="nextPageBtn" class="px-3 py-1.5 border border-slate-300 text-slate-600 bg-white hover:bg-slate-100 rounded text-sm disabled:opacity-50 transition-colors flex items-center gap-1">
                        下一頁 <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- 新增/編輯 彈出視窗 (Modal) -->
    <div id="formModal" class="fixed inset-0 z-50 hidden bg-slate-900 bg-opacity-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <!-- 標題會根據新增或編輯動態改變 -->
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">
                    <i class="fa-solid fa-pen-to-square text-blue-600 mr-2"></i>表單
                </h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 focus:outline-none">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="px-6 py-4 max-h-[60vh] overflow-y-auto" id="formContainer"></div>
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
                <button id="cancelFormBtn" class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">取消</button>
                <button id="saveFormBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> 儲存
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (包含 deleteDoc) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        // 🌟 引入 deleteDoc 供刪除功能使用
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEkSyqTnL2-O_W2VVu11lyhYbNOOq1EjI",
            authDomain: "onepharmacylocation.firebaseapp.com",
            projectId: "onepharmacylocation",
            storageBucket: "onepharmacylocation.firebasestorage.app",
            messagingSenderId: "767725009320",
            appId: "1:767725009320:web:68bc5bb1fef13602bd459d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION_NAME = "medicines";

        let allData =[];
        let currentFilteredData = [];
        let headers =[];
        
        // 狀態管理
        let currentEditDocId = null; 
        let isEditMode = false; // 🌟 判斷是新增還是編輯
        let currentSearchKeyword = ''; 
        let idHeaderName = ''; // 記錄主鍵的欄位名稱 (如:藥品代碼)
        
        let currentPage = 1;
        const ITEMS_PER_PAGE = 50;

        const UI = {
            searchInput: document.getElementById('searchInput'),
            statusMessage: document.getElementById('statusMessage'),
            tableContainer: document.getElementById('tableContainer'),
            tableHead: document.getElementById('tableHead'),
            tableBody: document.getElementById('tableBody'),
            noDataMessage: document.getElementById('noDataMessage'),
            
            addBtn: document.getElementById('addBtn'),
            importExcelBtn: document.getElementById('importExcelBtn'),
            exportExcelBtn: document.getElementById('exportExcelBtn'),
            excelFileInput: document.getElementById('excelFileInput'),
            
            formModal: document.getElementById('formModal'),
            modalTitle: document.getElementById('modalTitle'),
            formContainer: document.getElementById('formContainer'),
            closeModalBtn: document.getElementById('closeModalBtn'),
            cancelFormBtn: document.getElementById('cancelFormBtn'),
            saveFormBtn: document.getElementById('saveFormBtn'),
            
            paginationInfo: document.getElementById('paginationInfo'),
            prevPageBtn: document.getElementById('prevPageBtn'),
            nextPageBtn: document.getElementById('nextPageBtn'),
            pageNumbers: document.getElementById('pageNumbers')
        };

        async function init() {
            try {
                await fetchFromFirebase();
                setupEventListeners();
            } catch (error) {
                console.error("初始化失敗:", error);
                Swal.fire('連線失敗', '無法連接資料庫。', 'error');
            }
        }

        async function fetchFromFirebase() {
            UI.statusMessage.classList.remove('hidden');
            UI.tableContainer.classList.add('hidden');
            UI.exportExcelBtn.disabled = true;
            UI.addBtn.disabled = true;

            const querySnapshot = await getDocs(collection(db, COLLECTION_NAME));
            allData =[];
            
            querySnapshot.forEach((doc) => {
                let data = doc.data();
                data._id = doc.id;
                if (data['_1'] !== undefined) {
                    data['備註'] = data['_1'];
                    delete data['_1'];
                }
                allData.push(data);
            });

            if (allData.length > 0) {
                let headerSet = new Set();
                allData.forEach(item => {
                    Object.keys(item).forEach(k => { if(k !== '_id') headerSet.add(k); });
                });
                
                headers = Array.from(headerSet).sort((a, b) => {
                    const getWeight = (k) => {
                        if (k.includes('代碼') || k.includes('健保碼')) return -100;
                        if (k.includes('中文')) return -50;
                        if (k.includes('英文')) return -40;
                        if (k === '備註') return 100;
                        return 0;
                    };
                    return getWeight(a) - getWeight(b) || a.localeCompare(b);
                });

                // 找尋系統主鍵(藥品代碼)的欄位名稱
                idHeaderName = headers.find(h => h.includes('代碼') || h === '健保碼') || headers[0];

                renderTableHead();
                currentFilteredData = [...allData]; 
                currentPage = 1;
                renderPage(); 
                
                UI.statusMessage.classList.add('hidden');
                UI.tableContainer.classList.remove('hidden');
                UI.searchInput.disabled = false;
                UI.exportExcelBtn.disabled = false; 
                UI.addBtn.disabled = false; // 啟用新增按鈕
                UI.searchInput.focus();
            } else {
                UI.statusMessage.innerHTML = `
                    <div class="text-center">
                        <i class="fa-solid fa-box-open text-5xl text-slate-300 mb-4"></i>
                        <p class="text-slate-600 font-bold text-xl mb-2">資料庫目前是空的</p>
                        <p class="text-slate-500 mb-6">請點擊上方「匯入 Excel」按鈕建立初始資料。</p>
                    </div>
                `;
            }
        }

        function escapeHTML(str) {
            return String(str).replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])
            );
        }

        function highlightText(text, keyword) {
            const safeText = escapeHTML(text || '');
            if (!keyword) return safeText;
            const escapedKeyword = keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const regex = new RegExp(`(${escapedKeyword})`, 'gi');
            return safeText.replace(regex, '<mark class="search-highlight">$1</mark>');
        }

        function renderTableHead() {
            UI.tableHead.innerHTML = '';
            const tr = document.createElement('tr');
            headers.forEach(headerText => {
                const th = document.createElement('th');
                th.className = 'px-4 py-3 font-semibold whitespace-nowrap tracking-wider';
                th.textContent = headerText;
                tr.appendChild(th);
            });
            const actionTh = document.createElement('th');
            // 欄位稍微加寬以容納兩個按鈕
            actionTh.className = 'px-4 py-3 font-semibold text-center sticky right-0 bg-slate-100 shadow-[-2px_0_5px_rgba(0,0,0,0.05)] w-40';
            actionTh.textContent = '操作';
            tr.appendChild(actionTh);
            UI.tableHead.appendChild(tr);
        }

        function renderPage() {
            const totalItems = currentFilteredData.length;
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, totalItems);
            
            const pageData = currentFilteredData.slice(startIndex, endIndex);

            renderTableBody(pageData);
            updatePaginationUI(totalItems, totalPages, startIndex, endIndex);
        }

        function renderTableBody(data) {
            UI.tableBody.innerHTML = '';
            if (data.length === 0) {
                UI.noDataMessage.classList.remove('hidden');
                return;
            } else {
                UI.noDataMessage.classList.add('hidden');
            }

            const fragment = document.createDocumentFragment();
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'bg-white hover:bg-blue-50 transition-colors duration-150';
                
                headers.forEach((header, index) => {
                    const td = document.createElement('td');
                    td.className = 'px-4 py-3 border-b border-slate-100 max-w-[200px] truncate';
                    if(index === 0) td.className += ' font-bold text-slate-900';
                    td.innerHTML = highlightText(row[header], currentSearchKeyword);
                    td.title = row[header] || ''; 
                    tr.appendChild(td);
                });

                // 操作按鈕欄位
                const actionTd = document.createElement('td');
                actionTd.className = 'px-4 py-3 border-b border-slate-100 text-center sticky right-0 bg-white shadow-[-2px_0_5px_rgba(0,0,0,0.05)] whitespace-nowrap';
                
                // 編輯按鈕
                const editBtn = document.createElement('button');
                editBtn.className = 'text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md text-sm transition-colors font-medium';
                editBtn.innerHTML = '<i class="fa-solid fa-pen"></i> 編輯';
                editBtn.onclick = () => openFormModal(row); // 帶入資料代表編輯
                
                // 🌟 刪除按鈕
                const delBtn = document.createElement('button');
                delBtn.className = 'text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-md text-sm transition-colors font-medium ml-2';
                delBtn.innerHTML = '<i class="fa-solid fa-trash"></i> 刪除';
                delBtn.onclick = () => deleteData(row._id, row[idHeaderName]);
                
                actionTd.appendChild(editBtn);
                actionTd.appendChild(delBtn);
                tr.appendChild(actionTd);
                fragment.appendChild(tr);
            });
            UI.tableBody.appendChild(fragment);
        }

        function updatePaginationUI(totalItems, totalPages, startIndex, endIndex) {
            if (totalItems === 0) {
                UI.paginationInfo.textContent = '沒有符合的資料';
                UI.prevPageBtn.disabled = true;
                UI.nextPageBtn.disabled = true;
                UI.pageNumbers.innerHTML = '';
                return;
            }
            UI.paginationInfo.innerHTML = `顯示第 <span class="font-bold text-slate-800">${startIndex + 1}</span> 到 <span class="font-bold text-slate-800">${endIndex}</span> 筆，共 <span class="font-bold text-slate-800">${totalItems}</span> 筆`;
            UI.prevPageBtn.disabled = currentPage === 1;
            UI.nextPageBtn.disabled = currentPage === totalPages;

            UI.pageNumbers.innerHTML = '';
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1 text-sm rounded transition-colors ${i === currentPage ? 'bg-blue-600 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-slate-200'}`;
                btn.textContent = i;
                btn.onclick = () => { currentPage = i; renderPage(); };
                UI.pageNumbers.appendChild(btn);
            }
        }

        function handleSearch(e) {
            currentSearchKeyword = e.target.value.trim();
            const keywordLower = currentSearchKeyword.toLowerCase();
            
            if (keywordLower === '') {
                currentFilteredData =[...allData];
            } else {
                currentFilteredData = allData.filter(row => {
                    return Object.entries(row).some(([key, value]) => {
                        if(key === '_id') return false; 
                        return value && value.toString().toLowerCase().includes(keywordLower);
                    });
                });
            }
            currentPage = 1; 
            renderPage();
        }

        // ==========================================
        // 🌟 新增/編輯 智慧共用表單邏輯
        // ==========================================
        function openFormModal(rowData = null) {
            isEditMode = !!rowData; // 有資料代表編輯，沒資料代表新增
            currentEditDocId = isEditMode ? rowData._id : null;
            
            // 設定標題
            UI.modalTitle.innerHTML = isEditMode 
                ? '<i class="fa-solid fa-pen-to-square text-blue-600 mr-2"></i>編輯藥品資料' 
                : '<i class="fa-solid fa-plus text-emerald-600 mr-2"></i>新增藥品資料';

            UI.formContainer.innerHTML = '';

            headers.forEach(header => {
                const div = document.createElement('div');
                div.className = 'mb-4';
                
                const label = document.createElement('label');
                label.className = 'block text-sm font-medium text-slate-700 mb-1';
                
                // 主鍵標記為必填
                if(header === idHeaderName) {
                    label.innerHTML = `${header} <span class="text-red-500">*</span>`;
                } else {
                    label.textContent = header;
                }
                
                const isLongText = header.includes('備註') || header.includes('成分');
                const input = document.createElement(isLongText ? 'textarea' : 'input');
                input.className = 'bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 transition-colors';
                if(isLongText) input.rows = 3;
                else input.type = 'text';
                
                // 🌟 防呆進化：允許修改主鍵，但加上警告樣式與提示
                if(header === idHeaderName) {
                    input.placeholder = "請輸入唯一的藥品代碼 (必填)";
                    if (isEditMode) {
                        // 移除原先的 disabled，改為給予視覺警告
                        input.className += ' border-amber-400 focus:ring-amber-500 focus:border-amber-500 bg-amber-50';
                        input.title = "注意：修改代碼將會同步變更系統的唯一識別碼";
                        
                        // 在 label 旁邊加上警告文字
                        label.innerHTML = `${header} <span class="text-red-500">*</span> <span class="text-xs text-amber-600 font-normal ml-2"><i class="fa-solid fa-triangle-exclamation"></i> 修改主鍵將重新建立資料</span>`;
                    }
                }

                input.id = `form_field_${header}`;
                input.value = rowData ? (rowData[header] || '') : '';
                
                div.appendChild(label);
                div.appendChild(input);
                UI.formContainer.appendChild(div);
            });

            UI.formModal.classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function closeFormModal() {
            UI.formModal.classList.add('hidden');
            document.body.classList.remove('modal-open');
            currentEditDocId = null;
        }

        // 🌟 儲存邏輯 (區分新增與編輯，並加入主鍵修改邏輯)
        async function saveFormData() {
            // 抓取並檢查主鍵(藥品代碼)是否有填寫
            const idInput = document.getElementById(`form_field_${idHeaderName}`);
            const newIdValue = idInput.value.trim();
            
            if (!newIdValue) {
                Swal.fire('錯誤', `${idHeaderName} 不能為空白！`, 'warning');
                idInput.focus();
                return;
            }

            // 檢查代碼是否已存在 (適用於：新增模式，或編輯模式下修改了代碼)
            if (!isEditMode || (isEditMode && newIdValue !== currentEditDocId)) {
                const exists = allData.some(item => item._id === newIdValue);
                if (exists) {
                    Swal.fire('錯誤', `此 ${idHeaderName} 已經存在，請更換或使用搜尋功能尋找。`, 'error');
                    idInput.focus();
                    return;
                }
            }

            const originalBtnHtml = UI.saveFormBtn.innerHTML;
            UI.saveFormBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
            UI.saveFormBtn.disabled = true;

            try {
                const updatedData = {};
                headers.forEach(header => {
                    updatedData[header] = document.getElementById(`form_field_${header}`).value.trim();
                });

                // 寫入 Firebase
                if (isEditMode && newIdValue !== currentEditDocId) {
                    // 🌟 編輯模式且「修改了主鍵」：Firebase不支援改ID，所以要新增新文件，刪除舊文件
                    const newDocRef = doc(db, COLLECTION_NAME, newIdValue);
                    await setDoc(newDocRef, updatedData);
                    
                    const oldDocRef = doc(db, COLLECTION_NAME, currentEditDocId);
                    await deleteDoc(oldDocRef);
                } else {
                    // 🌟 新增模式，或編輯模式但「未修改主鍵」
                    const targetId = isEditMode ? currentEditDocId : newIdValue;
                    const docRef = doc(db, COLLECTION_NAME, targetId);
                    await setDoc(docRef, updatedData);
                }

                // 更新前端記憶體資料
                const finalData = { ...updatedData, _id: newIdValue }; // 確保使用最新的 _id
                
                if (isEditMode) {
                    // 編輯：用舊的 ID 找出現有陣列位置並更新為新資料
                    const dataIndex = allData.findIndex(item => item._id === currentEditDocId);
                    if(dataIndex > -1) allData[dataIndex] = finalData;

                    const filteredIndex = currentFilteredData.findIndex(item => item._id === currentEditDocId);
                    if(filteredIndex > -1) currentFilteredData[filteredIndex] = finalData;
                } else {
                    // 新增：推入陣列最前方
                    allData.unshift(finalData);
                    // 如果目前搜尋條件也符合，也要推入顯示陣列
                    if(currentSearchKeyword === '' || Object.values(finalData).some(v => String(v).includes(currentSearchKeyword))) {
                        currentFilteredData.unshift(finalData);
                    }
                }

                closeFormModal();
                renderPage(); 
                
                Swal.fire({
                    toast: true,
                    position: 'bottom-end',
                    icon: 'success',
                    title: isEditMode ? '資料已成功更新' : '成功新增一筆資料',
                    showConfirmButton: false,
                    timer: 2000,
                    timerProgressBar: true
                });

            } catch (error) {
                console.error("儲存失敗:", error);
                Swal.fire('錯誤', '儲存失敗。請確認您的網路連線或權限設定。', 'error');
            } finally {
                UI.saveFormBtn.innerHTML = originalBtnHtml;
                UI.saveFormBtn.disabled = false;
            }
        }

        // ==========================================
        // 🌟 刪除資料邏輯 (雙重確認)
        // ==========================================
        async function deleteData(docId, codeName) {
            // 第一步：SweetAlert2 雙重確認
            const result = await Swal.fire({
                title: '確定要刪除嗎？',
                html: `即將刪除代碼為 <b class="text-red-500">${codeName}</b> 的藥品。<br>此操作無法復原！`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444', // Tailwind red-500
                cancelButtonColor: '#64748b',
                confirmButtonText: '是的，確定刪除',
                cancelButtonText: '取消'
            });

            if (!result.isConfirmed) return;

            // 顯示載入動畫
            Swal.fire({
                title: '刪除中...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // 從 Firebase 刪除
                await deleteDoc(doc(db, COLLECTION_NAME, docId));

                // 從本地陣列移除
                allData = allData.filter(item => item._id !== docId);
                currentFilteredData = currentFilteredData.filter(item => item._id !== docId);

                // 重新渲染表格
                renderPage();

                // 成功提示
                Swal.fire({
                    toast: true,
                    position: 'bottom-end',
                    icon: 'success',
                    title: '已成功刪除資料',
                    showConfirmButton: false,
                    timer: 2000
                });

            } catch (error) {
                console.error("刪除失敗:", error);
                Swal.fire('刪除失敗', '網路錯誤或權限不足，請稍後再試。', 'error');
            }
        }

        // ==========================================
        // Excel 匯出 / 匯入
        // ==========================================
        function exportToExcel() {
            if (currentFilteredData.length === 0) {
                Swal.fire('提示', '目前畫面上沒有資料可以匯出', 'info');
                return;
            }
            const exportData = currentFilteredData.map(row => {
                const cleanRow = { ...row };
                delete cleanRow._id;
                return cleanRow;
            });
            const worksheet = XLSX.utils.json_to_sheet(exportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "藥品資料庫");
            const dateStr = new Date().toISOString().split('T')[0];
            XLSX.writeFile(workbook, `藥品資料庫_${dateStr}.xlsx`);
        }

        async function handleExcelImport(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (evt) => {
                try {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'array' });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" });

                    if (jsonData.length === 0) {
                        Swal.fire('錯誤', '匯入的 Excel 沒有資料。', 'error');
                        return;
                    }

                    const confirmResult = await Swal.fire({
                        title: '確認匯入',
                        text: `共 ${jsonData.length} 筆資料。同代碼將自動覆蓋，新代碼將自動新增。`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonText: '開始寫入',
                        cancelButtonText: '取消'
                    });

                    if (!confirmResult.isConfirmed) {
                        UI.excelFileInput.value = ''; 
                        return;
                    }

                    Swal.fire({
                        title: '資料上傳中...',
                        html: '請勿關閉視窗，已完成 <b>0</b> 筆',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading(); }
                    });

                    let successCount = 0;
                    const popupContent = Swal.getHtmlContainer().querySelector('b');

                    for (const row of jsonData) {
                        const isEmpty = Object.values(row).every(val => !val || String(val).trim() === '');
                        if (isEmpty) continue;

                        const cleanRow = {};
                        for (const key in row) {
                            if (key && key.trim() !== '') {
                                let finalKey = key === '_1' ? '備註' : key;
                                cleanRow[finalKey] = String(row[key]); 
                            }
                        }
                        
                        const idValue = cleanRow[idHeaderName] || cleanRow['健保碼'];
                        const docId = idValue ? idValue.trim() : `auto_${Date.now()}_${successCount}`;
                        
                        await setDoc(doc(db, COLLECTION_NAME, docId), cleanRow);
                        successCount++;
                        
                        if (successCount % 10 === 0 && popupContent) popupContent.textContent = successCount;
                    }
                    
                    Swal.fire({
                        title: '上傳完成！',
                        text: `🎉 成功處理了 ${successCount} 筆資料！`,
                        icon: 'success',
                        confirmButtonText: '重新載入'
                    }).then(() => window.location.reload());

                } catch (err) {
                    console.error("解析錯誤:", err);
                    Swal.fire('解析失敗', '請確認這是一個有效的 Excel 檔案。', 'error');
                }
                UI.excelFileInput.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // 事件監聽
        function setupEventListeners() {
            UI.searchInput.addEventListener('input', debounce(handleSearch, 300));
            
            // 🌟 綁定新增按鈕 (帶入 null 代表新增)
            UI.addBtn.addEventListener('click', () => openFormModal(null));
            
            UI.exportExcelBtn.addEventListener('click', exportToExcel);
            UI.importExcelBtn.addEventListener('click', () => UI.excelFileInput.click()); 
            UI.excelFileInput.addEventListener('change', handleExcelImport);

            UI.closeModalBtn.addEventListener('click', closeFormModal);
            UI.cancelFormBtn.addEventListener('click', closeFormModal);
            UI.saveFormBtn.addEventListener('click', saveFormData);
            
            UI.prevPageBtn.addEventListener('click', () => {
                if(currentPage > 1) { currentPage--; renderPage(); }
            });
            UI.nextPageBtn.addEventListener('click', () => {
                const maxPage = Math.ceil(currentFilteredData.length / ITEMS_PER_PAGE);
                if(currentPage < maxPage) { currentPage++; renderPage(); }
            });

            UI.formModal.addEventListener('click', (e) => {
                if (e.target === UI.formModal) closeFormModal();
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
