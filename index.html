<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健保藥品查詢與管理系統</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- 引入 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 🌟 引入 SweetAlert2 (取代原生 alert/confirm) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        thead th { position: sticky; top: 0; z-index: 10; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        body.modal-open { overflow: hidden; }
        /* 優化 SweetAlert 字體 */
        div:where(.swal2-container) { font-family: inherit; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans flex flex-col">

    <div class="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
        
        <!-- Header 區塊 -->
        <header class="mb-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-700 flex items-center justify-center md:justify-start gap-3">
                    <i class="fa-solid fa-database"></i> 藥品管理系統
                </h1>
                <p class="text-slate-500 mt-2 text-sm">支援全欄位搜尋、資料分頁與即時線上修改</p>
            </div>
            
            <div class="flex gap-2 w-full md:w-auto flex-col md:flex-row">
                <!-- 搜尋框 -->
                <div class="relative flex-grow md:w-80">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
                    </div>
                    <input type="text" id="searchInput" 
                        class="bg-white border border-slate-300 text-slate-900 rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5 shadow-sm transition-all" 
                        placeholder="搜尋藥品..." disabled>
                </div>
                <!-- 匯入按鈕 -->
                <button id="importBtn" class="bg-orange-500 hover:bg-orange-600 text-white font-medium rounded-lg text-sm px-4 py-2.5 transition-colors shadow-sm hidden flex items-center justify-center gap-2" title="從Google Sheets匯入資料">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 匯入初始資料
                </button>
            </div>
        </header>

        <!-- 狀態顯示區塊 -->
        <div id="statusMessage" class="flex flex-col items-center justify-center py-12">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
            <p id="statusText" class="text-slate-600 font-medium text-lg">正在從資料庫載入資料...</p>
        </div>

        <!-- 表格與分頁區塊 -->
        <div id="tableContainer" class="bg-white rounded-xl shadow-md overflow-hidden hidden border border-slate-200 flex flex-col">
            <!-- 表格本體 -->
            <div class="overflow-x-auto" style="min-height: 50vh; max-height: 65vh;">
                <table class="w-full text-sm text-left text-slate-600">
                    <thead id="tableHead" class="text-xs text-slate-700 uppercase bg-slate-100 shadow-sm">
                        <!-- 表頭 -->
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-200">
                        <!-- 資料 -->
                    </tbody>
                </table>
                <!-- 無搜尋結果提示 -->
                <div id="noDataMessage" class="hidden py-16 text-center text-slate-500">
                    <i class="fa-regular fa-folder-open text-5xl mb-4 text-slate-300"></i>
                    <p class="text-lg">找不到符合條件的藥品</p>
                </div>
            </div>

            <!-- 分頁控制項 (Pagination) -->
            <div class="bg-slate-50 px-4 py-3 border-t border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="text-sm text-slate-600 text-center sm:text-left w-full sm:w-auto" id="paginationInfo">
                    <!-- 顯示第 1 到 50 筆，共 1000 筆 -->
                </div>
                <div class="flex space-x-2">
                    <button id="prevPageBtn" class="px-3 py-1.5 border border-slate-300 text-slate-600 bg-white hover:bg-slate-100 rounded text-sm disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-1">
                        <i class="fa-solid fa-chevron-left"></i> 上一頁
                    </button>
                    <div id="pageNumbers" class="hidden sm:flex items-center space-x-1">
                        <!-- 頁碼按鈕會動態產生在這裡 -->
                    </div>
                    <button id="nextPageBtn" class="px-3 py-1.5 border border-slate-300 text-slate-600 bg-white hover:bg-slate-100 rounded text-sm disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-1">
                        下一頁 <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- 編輯彈出視窗 (Modal) -->
    <div id="editModal" class="fixed inset-0 z-50 hidden bg-slate-900 bg-opacity-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800"><i class="fa-solid fa-pen-to-square text-blue-600 mr-2"></i>編輯藥品資料</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-slate-600 focus:outline-none">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="px-6 py-4 max-h-[60vh] overflow-y-auto" id="editFormContainer">
                <!-- 表單欄位將由 JS 動態生成 -->
            </div>
            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
                <button id="cancelEditBtn" class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">取消</button>
                <button id="saveEditBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-floppy-disk"></i> 儲存修改
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEkSyqTnL2-O_W2VVu11lyhYbNOOq1EjI",
            authDomain: "onepharmacylocation.firebaseapp.com",
            projectId: "onepharmacylocation",
            storageBucket: "onepharmacylocation.firebasestorage.app",
            messagingSenderId: "767725009320",
            appId: "1:767725009320:web:68bc5bb1fef13602bd459d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION_NAME = "medicines";

        // 全域資料與分頁狀態
        let allData =[];
        let currentFilteredData =[];
        let headers =[];
        let currentEditDocId = null;
        
        let currentPage = 1;
        const ITEMS_PER_PAGE = 50;

        // DOM 元素
        const UI = {
            searchInput: document.getElementById('searchInput'),
            statusMessage: document.getElementById('statusMessage'),
            statusText: document.getElementById('statusText'),
            tableContainer: document.getElementById('tableContainer'),
            tableHead: document.getElementById('tableHead'),
            tableBody: document.getElementById('tableBody'),
            noDataMessage: document.getElementById('noDataMessage'),
            importBtn: document.getElementById('importBtn'),
            editModal: document.getElementById('editModal'),
            editFormContainer: document.getElementById('editFormContainer'),
            closeModalBtn: document.getElementById('closeModalBtn'),
            cancelEditBtn: document.getElementById('cancelEditBtn'),
            saveEditBtn: document.getElementById('saveEditBtn'),
            paginationInfo: document.getElementById('paginationInfo'),
            prevPageBtn: document.getElementById('prevPageBtn'),
            nextPageBtn: document.getElementById('nextPageBtn'),
            pageNumbers: document.getElementById('pageNumbers')
        };

        // 初始化
        async function init() {
            try {
                await fetchFromFirebase();
                setupEventListeners();
                UI.importBtn.classList.remove('hidden');
            } catch (error) {
                console.error("初始化失敗:", error);
                Swal.fire('連線失敗', '無法連接資料庫。請確認網路連線或 Firebase 設定。', 'error');
            }
        }

        // 讀取資料
        async function fetchFromFirebase() {
            UI.statusMessage.classList.remove('hidden');
            UI.tableContainer.classList.add('hidden');

            const querySnapshot = await getDocs(collection(db, COLLECTION_NAME));
            allData =[];
            
            querySnapshot.forEach((doc) => {
                let data = doc.data();
                data._id = doc.id;
                
                // 🌟 自動資料清洗：將資料庫中舊的 '_1' 欄位自動轉換成 '備註'
                if (data['_1'] !== undefined) {
                    data['備註'] = data['_1'];
                    delete data['_1'];
                }
                
                allData.push(data);
            });

            if (allData.length > 0) {
                let headerSet = new Set();
                allData.forEach(item => {
                    Object.keys(item).forEach(k => { if(k !== '_id') headerSet.add(k); });
                });
                
                // 🌟 智慧型欄位排序邏輯
                headers = Array.from(headerSet).sort((a, b) => {
                    // 定義欄位權重：越小排越前面，越大排越後面
                    const getWeight = (key) => {
                        if (key.includes('代碼') || key.includes('健保碼')) return -100; // 第一欄
                        if (key.includes('中文')) return -50;
                        if (key.includes('英文')) return -40;
                        if (key === '備註') return 100; // 最後一欄 (操作的前面)
                        return 0; // 其他放中間
                    };
                    
                    const weightA = getWeight(a);
                    const weightB = getWeight(b);
                    
                    // 如果權重不同，依權重排序
                    if (weightA !== weightB) return weightA - weightB;
                    // 如果權重相同，依筆畫或字母排序
                    return a.localeCompare(b);
                });

                renderTableHead();
                
                currentFilteredData =[...allData]; 
                currentPage = 1;
                renderPage(); 
                
                UI.statusMessage.classList.add('hidden');
                UI.tableContainer.classList.remove('hidden');
                UI.searchInput.disabled = false;
                UI.searchInput.focus();
            } else {
                UI.statusMessage.innerHTML = `
                    <div class="text-center">
                        <i class="fa-solid fa-box-open text-5xl text-slate-300 mb-4"></i>
                        <p class="text-slate-600 font-bold text-xl mb-2">資料庫目前是空的</p>
                        <p class="text-slate-500 mb-6">請點擊右上角按鈕匯入資料。</p>
                    </div>
                `;
            }
        }

        function renderTableHead() {
            UI.tableHead.innerHTML = '';
            const tr = document.createElement('tr');
            headers.forEach(headerText => {
                const th = document.createElement('th');
                th.className = 'px-4 py-3 font-semibold whitespace-nowrap tracking-wider';
                th.textContent = headerText;
                tr.appendChild(th);
            });
            const actionTh = document.createElement('th');
            actionTh.className = 'px-4 py-3 font-semibold text-center sticky right-0 bg-slate-100 shadow-[-2px_0_5px_rgba(0,0,0,0.05)] w-24';
            actionTh.textContent = '操作';
            tr.appendChild(actionTh);
            UI.tableHead.appendChild(tr);
        }

        // 分頁核心邏輯
        function renderPage() {
            const totalItems = currentFilteredData.length;
            const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
            
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, totalItems);
            
            const pageData = currentFilteredData.slice(startIndex, endIndex);

            renderTableBody(pageData);
            updatePaginationUI(totalItems, totalPages, startIndex, endIndex);
        }

        function renderTableBody(data) {
            UI.tableBody.innerHTML = '';
            
            if (data.length === 0) {
                UI.noDataMessage.classList.remove('hidden');
                return;
            } else {
                UI.noDataMessage.classList.add('hidden');
            }

            const fragment = document.createDocumentFragment();
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'bg-white hover:bg-blue-50 transition-colors duration-150';
                
                headers.forEach((header, index) => {
                    const td = document.createElement('td');
                    td.className = 'px-4 py-3 border-b border-slate-100 max-w-[200px] truncate';
                    if(index === 0) td.className += ' font-bold text-slate-900';
                    td.textContent = row[header] || '';
                    td.title = row[header] || '';
                    tr.appendChild(td);
                });

                const actionTd = document.createElement('td');
                actionTd.className = 'px-4 py-3 border-b border-slate-100 text-center sticky right-0 bg-white shadow-[-2px_0_5px_rgba(0,0,0,0.05)]';
                
                const editBtn = document.createElement('button');
                editBtn.className = 'text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md text-sm transition-colors font-medium';
                editBtn.innerHTML = '<i class="fa-solid fa-pen"></i> 編輯';
                editBtn.onclick = () => openEditModal(row);
                
                actionTd.appendChild(editBtn);
                tr.appendChild(actionTd);
                fragment.appendChild(tr);
            });
            UI.tableBody.appendChild(fragment);
        }

        function updatePaginationUI(totalItems, totalPages, startIndex, endIndex) {
            if (totalItems === 0) {
                UI.paginationInfo.textContent = '沒有符合的資料';
                UI.prevPageBtn.disabled = true;
                UI.nextPageBtn.disabled = true;
                UI.pageNumbers.innerHTML = '';
                return;
            }

            UI.paginationInfo.innerHTML = `顯示第 <span class="font-bold text-slate-800">${startIndex + 1}</span> 到 <span class="font-bold text-slate-800">${endIndex}</span> 筆，共 <span class="font-bold text-slate-800">${totalItems}</span> 筆`;
            UI.prevPageBtn.disabled = currentPage === 1;
            UI.nextPageBtn.disabled = currentPage === totalPages;

            UI.pageNumbers.innerHTML = '';
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            
            if (endPage - startPage < 4) {
                startPage = Math.max(1, endPage - 4);
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `px-3 py-1 text-sm rounded transition-colors ${i === currentPage ? 'bg-blue-600 text-white font-bold shadow-sm' : 'text-slate-600 hover:bg-slate-200'}`;
                btn.textContent = i;
                btn.onclick = () => {
                    currentPage = i;
                    renderPage();
                };
                UI.pageNumbers.appendChild(btn);
            }
        }

        function handleSearch(e) {
            const keyword = e.target.value.toLowerCase().trim();
            
            if (keyword === '') {
                currentFilteredData =[...allData];
            } else {
                currentFilteredData = allData.filter(row => {
                    return Object.entries(row).some(([key, value]) => {
                        if(key === '_id') return false; 
                        return value && value.toString().toLowerCase().includes(keyword);
                    });
                });
            }
            
            currentPage = 1; 
            renderPage();
        }

        function openEditModal(rowData) {
            currentEditDocId = rowData._id;
            UI.editFormContainer.innerHTML = '';

            headers.forEach(header => {
                const div = document.createElement('div');
                div.className = 'mb-4';
                
                const label = document.createElement('label');
                label.className = 'block text-sm font-medium text-slate-700 mb-1';
                label.textContent = header;
                
                const isLongText = header.includes('備註') || header.includes('成分');
                const input = document.createElement(isLongText ? 'textarea' : 'input');
                input.className = 'bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 transition-colors';
                if(isLongText) input.rows = 3;
                else input.type = 'text';
                
                // 鎖定主要代碼防呆
                if(header.includes('代碼') || header === '健保碼') {
                    input.disabled = true;
                    input.className += ' bg-slate-100 text-slate-500 cursor-not-allowed';
                }

                input.id = `edit_field_${header}`;
                input.value = rowData[header] || '';
                
                div.appendChild(label);
                div.appendChild(input);
                UI.editFormContainer.appendChild(div);
            });

            UI.editModal.classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function closeEditModal() {
            UI.editModal.classList.add('hidden');
            document.body.classList.remove('modal-open');
            currentEditDocId = null;
        }

        async function saveEditData() {
            if(!currentEditDocId) return;
            
            const originalBtnHtml = UI.saveEditBtn.innerHTML;
            UI.saveEditBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
            UI.saveEditBtn.disabled = true;

            try {
                const updatedData = {};
                headers.forEach(header => {
                    updatedData[header] = document.getElementById(`edit_field_${header}`).value;
                });

                const docRef = doc(db, COLLECTION_NAME, currentEditDocId);
                await updateDoc(docRef, updatedData);

                const dataIndex = allData.findIndex(item => item._id === currentEditDocId);
                if(dataIndex > -1) allData[dataIndex] = { ...updatedData, _id: currentEditDocId };

                const filteredIndex = currentFilteredData.findIndex(item => item._id === currentEditDocId);
                if(filteredIndex > -1) currentFilteredData[filteredIndex] = { ...updatedData, _id: currentEditDocId };

                closeEditModal();
                renderPage(); 
                
                // 🌟 SweetAlert2 Toast (取代原來的 alert 或自訂 DOM)
                Swal.fire({
                    toast: true,
                    position: 'bottom-end',
                    icon: 'success',
                    title: '資料已成功更新',
                    showConfirmButton: false,
                    timer: 2000,
                    timerProgressBar: true
                });

            } catch (error) {
                console.error("儲存失敗:", error);
                Swal.fire('錯誤', '儲存失敗。請確認您的權限設定。', 'error');
            } finally {
                UI.saveEditBtn.innerHTML = originalBtnHtml;
                UI.saveEditBtn.disabled = false;
            }
        }

        // 🌟 升級的 SweetAlert2 雙重防呆匯入機制
        async function importFromGoogleSheets() {
            // 第一道防護
            const result1 = await Swal.fire({
                title: '⚠️ 嚴重警告',
                text: '系統即將從 Google Sheets 抓取大量資料覆寫至 Firebase。這通常只在「第一次初始化系統」時使用。您確定要繼續嗎？',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#f97316',
                cancelButtonColor: '#64748b',
                confirmButtonText: '是的，我要繼續',
                cancelButtonText: '取消'
            });

            if (!result1.isConfirmed) return;

            // 第二道防護：文字驗證
            const result2 = await Swal.fire({
                title: '🔒 安全解鎖',
                text: '為防止意外覆蓋資料，請在下方輸入「確認匯入」四個字來解鎖：',
                input: 'text',
                inputPlaceholder: '請輸入：確認匯入',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonText: '取消',
                confirmButtonText: '強制匯入',
                preConfirm: (inputValue) => {
                    if (inputValue !== '確認匯入') {
                        Swal.showValidationMessage('輸入錯誤，請輸入「確認匯入」');
                        return false;
                    }
                    return true;
                }
            });

            if (!result2.isConfirmed) return;

            // 開始匯入
            UI.importBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...';
            UI.importBtn.disabled = true;

            const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSATPBmRfIX85c1RXK9QeRDyCeGZ6H2TySfVghh1EdWymMH-0VS_G2UWR4ctSXBPg/pub?gid=2049637445&single=true&output=csv';

            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    try {
                        let count = 0;
                        for (const row of results.data) {
                            const isEmpty = Object.values(row).every(val => !val || val.trim() === '');
                            if (isEmpty) continue;

                            const cleanRow = {};
                            for (const key in row) {
                                if (key && key.trim() !== '') {
                                    // 🌟 自動修正：匯入時若遇到 _1 欄位，直接存為 '備註'
                                    let finalKey = key;
                                    if (key === '_1') finalKey = '備註';
                                    cleanRow[finalKey] = row[key];
                                }
                            }
                            
                            // 支援舊的「健保碼」或目前的「藥品代碼」當作 ID
                            const idValue = cleanRow['藥品代碼'] || cleanRow['健保碼'];
                            const docId = idValue ? idValue.trim() : `auto_${Date.now()}_${count}`;
                            
                            await setDoc(doc(db, COLLECTION_NAME, docId), cleanRow);
                            count++;
                            
                            if (count % 10 === 0) {
                                UI.importBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 已寫入 ${count} 筆...`;
                            }
                        }
                        
                        Swal.fire({
                            title: '成功！',
                            text: `🎉 成功匯入 ${count} 筆資料！\n畫面即將重新整理。`,
                            icon: 'success',
                            confirmButtonText: '確定'
                        }).then(() => {
                            window.location.reload();
                        });

                    } catch (error) {
                        console.error("匯入失敗:", error);
                        Swal.fire('匯入失敗', '請打開開發者工具 (F12) 查看錯誤。', 'error');
                        UI.importBtn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 匯入初始資料';
                        UI.importBtn.disabled = false;
                    }
                }
            });
        }

        // 防抖函數
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        // 綁定事件
        function setupEventListeners() {
            UI.searchInput.addEventListener('input', debounce(handleSearch, 300));
            UI.closeModalBtn.addEventListener('click', closeEditModal);
            UI.cancelEditBtn.addEventListener('click', closeEditModal);
            UI.saveEditBtn.addEventListener('click', saveEditData);
            UI.importBtn.addEventListener('click', importFromGoogleSheets);
            
            UI.prevPageBtn.addEventListener('click', () => {
                if(currentPage > 1) {
                    currentPage--;
                    renderPage();
                }
            });
            UI.nextPageBtn.addEventListener('click', () => {
                const maxPage = Math.ceil(currentFilteredData.length / ITEMS_PER_PAGE);
                if(currentPage < maxPage) {
                    currentPage++;
                    renderPage();
                }
            });

            UI.editModal.addEventListener('click', (e) => {
                if (e.target === UI.editModal) closeEditModal();
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
